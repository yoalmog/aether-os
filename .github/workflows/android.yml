name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # FORCE JAVA 17 AFTER SYNC
      - name: Replace Java 21
        run: |
          grep -R "VERSION_21" android || true
          find android -type f -name "*.gradle" -exec sed -i 's/VERSION_21/VERSION_17/g' {} +
          grep -R "VERSION_21" android || true

      # FORCE JAVA HOME
      - name: Set Java 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aether-os-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
